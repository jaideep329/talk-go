<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talk Go!</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    :root {
      --pico-font-family: "SF Mono", "Fira Code", "Fira Mono", Menlo, Consolas, monospace;
      --pico-font-size: 14px;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .controls button {
      margin: 0;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      width: auto;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pico-muted-color);
      display: inline-block;
    }
    .status-dot.connected {
      background: #4ade80;
    }
    .status-dot.connecting {
      background: #facc15;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #transcript-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .turn {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }
    .turn-role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--pico-muted-color);
      margin-bottom: 0.25rem;
    }
    .turn-text {
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .turn.user .turn-text {
      color: var(--pico-color);
    }
    .turn.assistant .turn-text {
      color: var(--pico-secondary);
    }
    .turn-meta {
      font-size: 0.7rem;
      color: var(--pico-muted-color);
      margin-top: 0.25rem;
    }
    .latency-badge {
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      background: var(--pico-muted-border-color);
      font-size: 0.65rem;
      color: var(--pico-muted-color);
      margin-right: 0.3rem;
    }
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--pico-muted-color);
      font-size: 0.9rem;
    }
    footer {
      padding: 0.75rem 1.5rem;
      border-top: 1px solid var(--pico-muted-border-color);
      text-align: center;
      font-size: 0.7rem;
      color: var(--pico-muted-color);
    }
    #live-transcript {
      padding: 0.75rem 1.5rem;
      border-top: 1px solid var(--pico-muted-border-color);
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .live-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--pico-muted-color);
      margin-bottom: 0.2rem;
    }
    .live-text {
      color: var(--pico-muted-color);
      font-style: italic;
      line-height: 1.5;
    }
    [x-cloak] {
      display: none !important;
    }
    #remote-audio {
      display: none;
    }
    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 0.75rem;
      }
      .controls {
        width: 100%;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body x-data="app()">
  <header>
    <div style="display: flex; align-items: center; gap: 0.6rem;">
      <h1>TALK</h1>
      <span class="status-dot" :class="statusClass"></span>
      <span style="font-size: 0.75rem; color: var(--pico-muted-color);" x-text="statusText"></span>
    </div>
    <div class="controls">
      <button @click="connect()" :disabled="connected || connecting" class="outline">Connect</button>
      <button @click="disconnect()" :disabled="!connected" class="outline secondary">Disconnect</button>
      <button @click="toggleMic()" :disabled="!connected" class="outline contrast" x-text="micLabel"></button>
    </div>
  </header>

  <div id="transcript-area" x-ref="transcript">
    <template x-if="turns.length === 0 && !connected">
      <div class="empty-state">Click Connect to start a conversation</div>
    </template>
    <template x-if="turns.length === 0 && connected">
      <div class="empty-state">Listening...</div>
    </template>
    <template x-for="(turn, i) in turns" :key="i">
      <div class="turn" :class="turn.role">
        <div class="turn-role" x-text="turn.role"></div>
        <div class="turn-text" x-text="turn.text"></div>
        <div class="turn-meta" x-show="turn.metrics && turn.metrics.length">
          <template x-for="m in (turn.metrics || [])">
            <span class="latency-badge" x-text="m.processor + ' ' + m.label + ': ' + Math.round(m.value_ms) + 'ms'"></span>
          </template>
        </div>
      </div>
    </template>
  </div>

  <div id="live-transcript" x-show="liveText || assistantLiveText" x-cloak>
    <template x-if="assistantLiveText">
      <div style="margin-bottom: 0.5rem;">
        <div class="live-label">assistant</div>
        <div class="live-text" style="color: var(--pico-secondary);" x-text="assistantLiveText"></div>
      </div>
    </template>
    <template x-if="liveText">
      <div>
        <div class="live-label">you</div>
        <div class="live-text" x-text="liveText"></div>
      </div>
    </template>
  </div>

  <footer>
    <span x-show="lastError" x-text="lastError"></span>
    <span x-show="!lastError && connected" x-text="'Room: ' + roomName + (conversationId ? ' | Conversation: ' + conversationId : '')"></span>
  </footer>

  <div id="remote-audio"></div>

  <script>
    // Daily SDK loaded lazily on first connect.
    let DailyIframe;
    // Keep call object outside Alpine's reactive proxy; SDK internals are
    // not designed to be proxied.
    let _call = null;
    const CREATE_ROOM_URL = "http://localhost:8000/bot/create_room";
    const DISHA_TEST_USER_ID = "d37d59b9-9727-40ea-9de9-8bba729af6e9";

    function attachDailyAudio(event) {
      const track = event && event.track;
      if (!track || track.kind !== "audio") return;
      const participant = event.participant || {};
      if (participant.local) return;
      const remoteAudio = document.getElementById("remote-audio");
      const id = participant.session_id || participant.user_id || track.id;
      const existing = remoteAudio.querySelector(`[data-track-id="${track.id}"]`);
      if (existing) return;
      const el = document.createElement("audio");
      el.autoplay = true;
      el.playsInline = true;
      el.dataset.participantId = id;
      el.dataset.trackId = track.id;
      el.srcObject = new MediaStream([track]);
      remoteAudio.appendChild(el);
    }

    function detachDailyAudio(event) {
      const track = event && event.track;
      if (!track) return;
      const remoteAudio = document.getElementById("remote-audio");
      const el = remoteAudio.querySelector(`[data-track-id="${track.id}"]`);
      if (el) el.remove();
    }

    function app() {
      return {
        connected: false,
        connecting: false,
        micEnabled: true,
        roomName: "",
        conversationId: "",
        lastError: "",
        turns: [],
        liveText: "",
        assistantLiveText: "",
        currentAssistantText: "",
        pendingMetrics: [],

        get statusClass() {
          if (this.connected) return "connected";
          if (this.connecting) return "connecting";
          return "";
        },
        get statusText() {
          if (this.connected) return "Connected";
          if (this.connecting) return "Connecting...";
          return "Disconnected";
        },
        get micLabel() {
          return this.micEnabled ? "Mute" : "Unmute";
        },

        async connect() {
          this.connecting = true;
          this.lastError = "";
          this.turns = [];
          try {
            // Lazy-load Daily SDK on first connect.
            if (!DailyIframe) {
              const daily = await import("https://cdn.jsdelivr.net/npm/@daily-co/daily-js/+esm");
              DailyIframe = daily.default || daily.DailyIframe || daily;
            }

            const res = await fetch(CREATE_ROOM_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                user_id: DISHA_TEST_USER_ID,
                resume_enabled: true,
              }),
            });
            if (!res.ok) {
              const errorText = await res.text();
              throw new Error(errorText || res.statusText);
            }
            const roomData = await res.json();
            const roomUrl = roomData.room_url;
            const token = roomData.token;
            if (!roomUrl || !token) {
              throw new Error("Create Room did not return Daily connection details");
            }
            this.roomName = roomData.room_name || "";
            this.conversationId = roomData.conversation_id || "";

            // Connect Daily (outside Alpine proxy).
            _call = DailyIframe.createCallObject({
              audioSource: true,
              videoSource: false,
              subscribeToTracksAutomatically: true,
            });

            _call.on("track-started", attachDailyAudio);
            _call.on("track-stopped", detachDailyAudio);
            _call.on("left-meeting", () => {
              this.connecting = false;
              this.finishDisconnect();
            });
            _call.on("app-message", (event) => {
              try {
                const data = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
                this.handleUIEvent(data);
              } catch (err) {
                console.warn("Daily app message parse error:", err);
              }
            });

            await _call.join({
              url: roomUrl,
              token,
              startVideoOff: true,
              startAudioOff: false,
            });
            try {
              await _call.sendAppMessage({
                label: "rtvi-ai",
                type: "client-ready",
                id: `client-ready-${Date.now()}`,
                data: {
                  version: "1.2.0",
                  about: {
                    library: "talk-go-daily-client",
                    platform: "browser",
                  },
                },
              }, "*");
            } catch (err) {
              console.warn("sendAppMessage(client-ready) failed:", err);
            }
            _call.setLocalAudio(true);
            this.connected = true;
            this.connecting = false;
          } catch (err) {
            console.error("Connect error:", err);
            this.lastError = err.message || "Connect failed";
            this.connecting = false;
            if (_call) {
              _call.destroy();
              _call = null;
            }
          }
        },

        async disconnect() {
          // Ask the bot to drain gracefully via a Daily app message.
          // The bot will publish an RTVI call_ended server-message once cleanup completes,
          // and we tear down the call then. If publish fails (call not
          // ready / already gone), just tear down immediately.
          if (_call) {
            try {
              await _call.sendAppMessage({ type: "end_call" }, "*");
              return;
            } catch (err) {
              console.warn("sendAppMessage(end_call) failed, tearing down locally:", err);
            }
          }
          this.finishDisconnect();
        },

        finishDisconnect() {
          if (_call) {
            const call = _call;
            _call = null;
            call.leave().catch(() => {});
            call.destroy();
          }
          document.getElementById("remote-audio").replaceChildren();
          this.connected = false;
          this.roomName = "";
          this.conversationId = "";
        },

        toggleMic() {
          if (!_call) return;
          this.micEnabled = !this.micEnabled;
          _call.setLocalAudio(this.micEnabled);
        },

        handleUIEvent(event) {
          if (!event || event.label !== "rtvi-ai") return;
          const d = event.data || {};
          switch (event.type) {
            case "user-transcription":
              if (d.final === false) {
                this.liveText = d.text || "";
                break;
              }
              this.liveText = "";
              this.commitAssistantTurn();
              this.assistantLiveText = "";
              if (d.text) this.commitUserTurn(d.text);
              break;

            case "bot-transcription":
              this.appendAssistantText(d.text || "");
              break;

            case "bot-started-speaking":
              break;

            case "bot-stopped-speaking":
              this.commitAssistantTurn();
              break;

            case "server-message":
              this.handleServerMessage(d);
              break;
          }
        },

        commitUserTurn(text) {
          const last = this.turns[this.turns.length - 1];
          if (last && last.role === "user") {
            last.text = this.appendText(last.text, text);
          } else {
            this.turns.push({ role: "user", text: text, metrics: null });
          }
          this.scrollToBottom();
        },

        appendAssistantText(text) {
          if (!text) return;
          this.currentAssistantText = this.appendText(this.currentAssistantText, text);
          this.assistantLiveText = this.currentAssistantText;
          this.scrollToBottom();
        },

        commitAssistantTurn() {
          const text = this.currentAssistantText.trim();
          if (text !== "") {
            this.turns.push({ role: "assistant", text, metrics: [...this.pendingMetrics] });
          }
          this.currentAssistantText = "";
          this.assistantLiveText = "";
          this.pendingMetrics = [];
          this.scrollToBottom();
        },

        handleServerMessage(data) {
          if (typeof data === "string") {
            if (data.includes("Interruption received")) this.commitAssistantTurn();
            return;
          }
          if (data.type === "metric") {
            this.pendingMetrics.push(data);
            return;
          }
          if (data.type === "call_ended") {
            this.finishDisconnect();
          }
        },

        appendText(base, next) {
          const cleaned = `${next || ""}`.trim();
          if (!cleaned) return base;
          if (!base) return cleaned;
          return /^[.,!?;:]/.test(cleaned) ? `${base}${cleaned}` : `${base} ${cleaned}`;
        },

        scrollToBottom() {
          this.$nextTick(() => {
            const el = this.$refs.transcript;
            if (el) el.scrollTop = el.scrollHeight;
          });
        },
      };
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
</body>
</html>
