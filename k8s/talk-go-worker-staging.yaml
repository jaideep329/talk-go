apiVersion: apps/v1
kind: Deployment
metadata:
  name: $TALK_GO_DEPLOYMENT_NAME
  namespace: $GKE_NAMESPACE
  labels:
    app: $TALK_GO_DEPLOYMENT_NAME
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 50%
  selector:
    matchLabels:
      app: $TALK_GO_DEPLOYMENT_NAME
  template:
    metadata:
      labels:
        app: $TALK_GO_DEPLOYMENT_NAME
        managed-by: "deployment"
        pod-template-hash-binpack: $POD_TEMPLATE_VERSION
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      restartPolicy: Always
      priorityClassName: high-priority-worker
      terminationGracePeriodSeconds: 5400
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "worker"
        effect: "NoSchedule"
      nodeSelector:
        cloud.google.com/gke-nodepool: worker-pool-v3
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: $TALK_GO_DEPLOYMENT_NAME
                  pod-template-hash-binpack: $POD_TEMPLATE_VERSION
              topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - $TALK_GO_DEPLOYMENT_NAME
              - key: pod-template-hash-binpack
                operator: Exists
              - key: pod-template-hash-binpack
                operator: NotIn
                values:
                - $POD_TEMPLATE_VERSION
            topologyKey: kubernetes.io/hostname
      containers:
      - name: talk-go-worker
        image: us-east1-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REPOSITORY_NAME/talk-go-worker:latest
        imagePullPolicy: Always
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                exec 1>/proc/1/fd/1 2>/proc/1/fd/2
                for i in $(seq 1 300); do
                  curl -fsS http://localhost:7860/bot/pre_stop_check && exit 0
                  sleep 1
                done
                exit 0
        envFrom:
        - secretRef:
            name: talk-go-worker-env
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: GKE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        readinessProbe:
          httpGet:
            path: /bot/readiness_check
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "100m"
            memory: "100Mi"
          limits:
            cpu: "100m"
            memory: "100Mi"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: talk-go-worker-scaledobject
  namespace: $GKE_NAMESPACE
spec:
  scaleTargetRef:
    name: $TALK_GO_DEPLOYMENT_NAME
  pollingInterval: 10
  cooldownPeriod: 180
  minReplicaCount: $TALK_GO_MIN_REPLICA_COUNT
  maxReplicaCount: 20
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
          - type: Percent
            value: 50
            periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
          - type: Percent
            value: 100
            periodSeconds: 20
          - type: Pods
            value: 5
            periodSeconds: 20
          selectPolicy: Min
  triggers:
  - type: postgresql
    metadata:
      query: "SELECT COUNT(*) FROM gkeworkermachines WHERE deployment_name = '$TALK_GO_DEPLOYMENT_NAME' AND status IN ('active', 'reserved', 'provisioning')"
      targetQueryValue: "0.95"
      activationQueryValue: "0"
      connectionFromEnv: POSTGRESQL_CONNECTION_STRING
    authenticationRef:
      name: postgresql-trigger-auth
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: talk-go-worker-pdb
  namespace: $GKE_NAMESPACE
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: $TALK_GO_DEPLOYMENT_NAME
