apiVersion: apps/v1
kind: Deployment
metadata:
  name: $GKE_DEPLOYMENT_NAME
  namespace: $GKE_NAMESPACE
  labels:
    app: $GKE_DEPLOYMENT_NAME
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 50%
  selector:
    matchLabels:
      app: $GKE_DEPLOYMENT_NAME
  template:
    metadata:
      labels:
        app: $GKE_DEPLOYMENT_NAME
        managed-by: "deployment"
        pod-template-hash-binpack: $POD_TEMPLATE_VERSION
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
    spec:
      restartPolicy: Always
      priorityClassName: high-priority-worker
      terminationGracePeriodSeconds: 5400
      # Tolerate the worker pool taint to allow scheduling on worker nodes
      tolerations:
      - key: "workload"
        operator: "Equal"
        value: "worker"
        effect: "NoSchedule"
      # Require scheduling on worker pool nodes only
      nodeSelector:
        cloud.google.com/gke-nodepool: vago-worker-pool
      # Affinity-based binpacking for maximum node utilization (3 pods per node)
      affinity:
        # Pod affinity: STRONG binpacking of same version pods (3 per node for max utilization)
        # Attracts pods with matching version label
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: $GKE_DEPLOYMENT_NAME
                  pod-template-hash-binpack: $POD_TEMPLATE_VERSION
              topologyKey: kubernetes.io/hostname
        # Pod anti-affinity: ONLY repel pods with DIFFERENT version during rolling updates
        # Avoids nodes with old version pods that may be terminating
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - $GKE_DEPLOYMENT_NAME
              - key: pod-template-hash-binpack
                operator: Exists
              - key: pod-template-hash-binpack
                operator: NotIn
                values:
                - $POD_TEMPLATE_VERSION
            topologyKey: kubernetes.io/hostname
      containers:
      - name: talk-go-worker
        image: us-east1-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REPOSITORY_NAME/talk-go-worker:latest
        imagePullPolicy: Always
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                exec 1>/proc/1/fd/1 2>/proc/1/fd/2
                for i in $(seq 1 300); do
                  curl -fsS http://localhost:7860/bot/pre_stop_check && exit 0
                  sleep 1
                done
                exit 0
        envFrom:
        - secretRef:
            name: talk-go-worker-env
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: GKE_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: GKE_DEPLOYMENT_NAME
          value: "$GKE_DEPLOYMENT_NAME"
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
#        livenessProbe:
#          httpGet:
#            path: /bot/health_check
#            port: 7860
#          initialDelaySeconds: 30
#          periodSeconds: 10
#          timeoutSeconds: 10
#          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /bot/readiness_check
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
        resources:
          requests:
            cpu: "120m"
            memory: "100Mi"
          limits:
            cpu: "120m"
            memory: "100Mi"
---
# PostgreSQL connection secret for KEDA to query worker machine availability
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-connection-string
  namespace: $GKE_NAMESPACE
type: Opaque
stringData:
  connection: "postgresql://$DB_USER:$DB_PASSWORD@$DB_HOST:$DB_PORT/$DB_NAME?sslmode=require"
---
# KEDA ScaledObject - Autoscales deployment based on worker machine availability
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: $GKE_DEPLOYMENT_NAME-scaledobject
  namespace: $GKE_NAMESPACE
spec:
  scaleTargetRef:
    name: $GKE_DEPLOYMENT_NAME
  pollingInterval: 10
  cooldownPeriod: 120
  minReplicaCount: 4  # Safety net if query fails
  maxReplicaCount: 600
  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          tolerance: "0.01"
          stabilizationWindowSeconds: 120
          policies:
          - type: Percent
            value: 50
            periodSeconds: 45
        scaleUp:
          tolerance: "0.01"
          stabilizationWindowSeconds: 10
          policies:
          - type: Pods
            value: 1000
            periodSeconds: 15
  triggers:
  - type: postgresql
    metadata:
      # Returns total desired pods: half baseline buffer (from scaling_buffer_schedule table) + active + reserved + provisioning
      query: "
      WITH base_time AS (
        SELECT EXTRACT(HOUR FROM (NOW() AT TIME ZONE 'Asia/Kolkata')) AS h,
               EXTRACT(MINUTE FROM (NOW() AT TIME ZONE 'Asia/Kolkata')) AS m
      )
      SELECT (COALESCE((
        SELECT buffer_value FROM scalingbufferschedule, base_time
        WHERE (hour < base_time.h) OR (hour = base_time.h AND minute_start <= base_time.m)
        ORDER BY hour DESC, minute_start DESC LIMIT 1
      ), (
        SELECT buffer_value FROM scalingbufferschedule
        ORDER BY hour DESC, minute_start DESC LIMIT 1
      ), 0) / 2.0) + (
        SELECT COUNT(*) FROM gkeworkermachines
        WHERE deployment_name = '$GKE_DEPLOYMENT_NAME'
        AND status IN ('active', 'reserved', 'provisioning')
      )"
      targetQueryValue: "0.95"  # Divides result by 10 to get actual replica count
      activationQueryValue: "0"  # Always active
      connectionFromEnv: POSTGRESQL_CONNECTION_STRING
    authenticationRef:
      name: postgresql-trigger-auth
---
# KEDA TriggerAuthentication - Provides database credentials to KEDA for PostgreSQL access
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: postgresql-trigger-auth
  namespace: $GKE_NAMESPACE
spec:
  secretTargetRef:
  - parameter: connection
    name: postgresql-connection-string
    key: connection
---
# PodDisruptionBudget - Ensures minimum pods available during disruptions and deployments
# With maxUnavailable: 50%, this PDB allows controlled disruption while maintaining service
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: $GKE_DEPLOYMENT_NAME-pdb
  namespace: $GKE_NAMESPACE
spec:
  minAvailable: 5
  selector:
    matchLabels:
      app: $GKE_DEPLOYMENT_NAME
